<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Luxe Living</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f9fafb; /* Very light gray to match image */
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 40px 20px;
    }

    .login-container {
      margin: auto;
      width: 100%;
      max-width: 440px;
      padding: 48px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }



    .title {
      text-align: center;
      font-size: 44px;
      font-weight: 800;
      color: #111827;
      line-height: 1.1;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      font-size: 15px;
      color: #6B7280;
      margin-bottom: 32px;
    }

    .social-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      border: 1px solid #E5E7EB;
      border-radius: 24px; /* pill shape */
      background: #ffffff;
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .social-btn:hover {
      background: #f9fafb;
      border-color: #D1D5DB;
    }

    .social-btn img {
      width: 18px;
      height: 18px;
    }
    
    .social-btn .fa-facebook {
      color: #1877F2;
      font-size: 18px;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #9CA3AF;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #E5E7EB;
    }

    .divider span {
      padding: 0 16px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1px solid #D1D5DB;
      border-radius: 12px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .form-control::placeholder {
      color: #9CA3AF;
    }

    .form-control:focus {
      border-color: #5542F6;
      box-shadow: 0 0 0 3px rgba(85, 66, 246, 0.1);
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .forgot-link {
      font-size: 13px;
      color: #5542F6;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      border: 1px solid #D1D5DB;
      border-radius: 4px;
      cursor: pointer;
      accent-color: #5542F6;
    }

    .remember-row label {
      font-size: 14px;
      color: #374151;
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      height: 52px;
      background: #5542F6; /* Matches the purple button in image */
      color: #ffffff;
      border: none;
      border-radius: 26px; /* Pill shape */
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 24px;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 14px rgba(85, 66, 246, 0.2);
    }

    .submit-btn:hover {
      background: #4B39EB;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .register-link {
      text-align: center;
      font-size: 14px;
      color: #6B7280;
    }

    .register-link a {
      color: #5542F6;
      font-weight: 600;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    /* Theme toggle from template */
    .theme-toggle-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #E5E7EB;
      background: white;
      color: #6B7280;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    /* Dark Mode Overrides */
    [data-theme="dark"] body {
      background-color: #080812;
      color: #e8d5b7;
    }

    [data-theme="dark"] .login-container {
      background: #1a1a2e;
      border: 1px solid #2d2d4a;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    [data-theme="dark"] .title {
      color: #ffffff;
    }

    [data-theme="dark"] .subtitle {
      color: #9CA3AF;
    }

    [data-theme="dark"] .social-btn {
      background: #0f0f1a;
      border-color: #2d2d4a;
      color: #e8d5b7;
    }

    [data-theme="dark"] .social-btn:hover {
      background: #2d2d4a;
    }

    [data-theme="dark"] .divider::before,
    [data-theme="dark"] .divider::after {
      border-color: #2d2d4a;
    }

    [data-theme="dark"] .form-label,
    [data-theme="dark"] .remember-row label {
      color: #e8d5b7;
    }

    [data-theme="dark"] .form-control {
      background: #0f0f1a;
      border-color: #2d2d4a;
      color: #ffffff;
    }

    [data-theme="dark"] .form-control:focus {
      border-color: #5542F6;
    }

    [data-theme="dark"] .theme-toggle-btn {
      background: #1a1a2e;
      border-color: #2d2d4a;
      color: #e8d5b7;
    }
  </style>
</head>

<body>
  <button class="theme-toggle-btn theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <i class="fas fa-moon"></i>
  </button>

  <div class="login-container">
    <div class="brand" style="display: flex; justify-content: center; margin-bottom: 24px;">
      <a href="index.html" class="logo" style="font-size: 28px;">
        <span class="logo-icon" style="width: 48px; height: 48px; font-size: 24px;"><i class="fas fa-couch"></i></span>
        <span>Luxe Living</span>
      </a>
    </div>
    
    <h1 class="title">Welcome<br>Back</h1>
    <p class="subtitle">Please enter your details to sign in.</p>

    <div class="social-buttons">
      <button class="social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
      <button class="social-btn">
        <i class="fab fa-facebook"></i>
        Facebook
      </button>
    </div>

    <div class="divider">
      <span>OR</span>
    </div>

    <form action="../dashboard/user-dashboard.html">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label class="form-label" for="password">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember">
        <label for="remember">Remember for 30 days</label>
      </div>

      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <div class="register-link">
      Don't have an account? <a href="#">Register now</a>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
