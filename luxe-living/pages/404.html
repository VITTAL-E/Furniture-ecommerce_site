<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

<body>
  <header class="header" role="banner">
    <div class="header-inner">

        </p>

        <!-- Search -->
        <div style="max-width:400px;margin:0 auto var(--space-6);">

            <input type="text" placeholder="Search for products..." class="form-control" aria-label="Search">
            <button aria-label="Search" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);"><i class="fas fa-search"></i></button>
          </div>
        </div>

        <!-- Quick Links -->
        <div class="flex justify-center gap-3 mb-6 flex-wrap">
          <a href="index.html" class="btn btn-accent"><i class="fas fa-home"></i> Back to Home</a>
          <a href="shop.html" class="btn btn-outline"><i class="fas fa-shopping-bag"></i> Browse Shop</a>
          <a href="contact.html" class="btn btn-ghost"><i class="fas fa-headset"></i> Contact Support</a>
        </div>

        <!-- Popular Pages -->
        <div class="mt-8">
          <h4 class="text-muted mb-4" style="font-family:var(--font-body);font-weight:var(--weight-medium);">Popular Pages</h4>
          <div class="flex justify-center gap-5 flex-wrap">

            <a href="blog.html" class="text-sm" style="color:var(--accent);">Blog</a>
            <a href="about.html" class="text-sm" style="color:var(--accent);">About Us</a>
          </div>
        </div>
      </div>
    </div>

  <div id="toast-container" class="toast-container"></div>
